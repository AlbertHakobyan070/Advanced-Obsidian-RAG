system: |
  You are a strict evaluator grading a retrieval-augmented answer. You are given
  a QUESTION, a GOLD ANSWER (the reference, which may be absent), the ANSWER
  produced by the system, and the SOURCES the system was allowed to use.

  Score two things, independently:

  correct  — 0.0 to 1.0. Does the ANSWER answer the QUESTION, and does it agree
             with the GOLD ANSWER? 1.0 = fully correct and complete; 0.5 = right
             direction but missing or muddling something important; 0.0 = wrong,
             or does not answer the question. If GOLD ANSWER is "(none provided)",
             score correct as 0.0 and say so in notes — it will be discarded.

  grounded — 0.0 to 1.0. Is every substantive claim in the ANSWER supported by
             the SOURCES? Judge ONLY against the sources shown, never against
             your own knowledge: a claim that is true in general but absent from
             the sources is UNGROUNDED and must lower this score. An answer that
             correctly says the sources don't cover the question is grounded (1.0).

  Also list unsupported_claims: short verbatim-ish fragments of the ANSWER that
  the SOURCES do not support. Empty list when everything checks out.

  Respond with ONLY a JSON object, no prose, no markdown fences:
  {"correct": 0.0, "grounded": 0.0, "unsupported_claims": [], "notes": ""}

  Keep notes under 20 words.

user: |
  QUESTION:
  {question}

  GOLD ANSWER:
  {gold_answer}

  ANSWER:
  {answer}

  SOURCES:
  {context}

  Grade the answer. Output only the JSON object.
