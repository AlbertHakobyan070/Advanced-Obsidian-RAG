# ============================================================
#  Personal RAG — central configuration
#  Copy this file to config.yaml and adapt the paths to your machine.
#  config.yaml is gitignored, so pulls never overwrite your settings.
#  Secrets live in .env (also gitignored). Tunables live here.
# ============================================================

parser:
  # Any string value in this file may reference an environment variable as
  # ${NAME} or ${NAME:-default} — useful for containers, where the vault path
  # has to match a bind-mount. An unset ${NAME} stays literal rather than
  # becoming "", which would point the parser at the filesystem root.
  vault_path: "path/to/your/obsidian/vault"
  max_chunk_size: 3000
  min_chunk_size: 200
  overlap_size: 150
  chunking: heading              # heading | fixed | document | none (how OVERSIZED sections split)
  skip_dirs: [".obsidian", ".trash", ".git", "__path_fix_backups", "__MACOSX"]

# ---------------------------------------------------------------------------
# What the folder-derived grouping label is CALLED, and where it comes from.
#
# The METADATA keys are always course_code / course_name whatever `label` says.
# Renaming them would invalidate every stored chunk and force a full re-embed,
# so only the console's wording and the folder maps are configurable.
#
# The shipped parser has built-in maps for an academic vault (course folders,
# CS/DS course codes). They are a DEFAULT, not a requirement:
#   * detect_from_path: false  -> nothing is derived from folder names; every
#                                 chunk is "unknown" until you retag. Right for
#                                 a vault with no folder convention to mine.
#   * all four maps null       -> keep the built-in academic maps.
#   * ANY map supplied         -> the built-ins are dropped WHOLESALE and only
#                                 what you supply applies. All-or-nothing, so a
#                                 vault that declares its own taxonomy can't
#                                 still be labelled through the built-in
#                                 keyword fallback.
# ---------------------------------------------------------------------------
taxonomy:
  label: course                   # e.g. course | project | client | topic
  label_plural: courses
  detect_from_path: true
  folder_map: null                # {"folder name": "Label"}
  domain_map: null                # {"Label": "ml"}  (stats/ml/nlp/viz/biz/ts/db/math/swe/prog)
  code_map: null                  # {"CS 101": "Label"}
  keywords: null                  # {"substring": "Label"} — last-resort match

paths:
  chunks_file: "data/chunks.jsonl"
  chroma_dir: "data/chroma_db"
  bm25_index: "data/bm25_index.pkl"
  collection_name: "obsidian_vault"


embedding:
  # provider: openai | local
  #   openai -> text-embedding-3-small via API
  #   local  -> sentence-transformers model running on this machine (no API cost)
  provider: local
  local_model: "BAAI/bge-small-en-v1.5"
  batch_size: 100
  dimensions: 384

# ---------------------------------------------------------------------------
# Named LLM backends. Any role (generation / eval.judge / ...) points at one by
# name. Add an entry for anything speaking an OpenAI-compatible
# /v1/chat/completions or an Anthropic-compatible endpoint.
#
# SECRETS NEVER LIVE HERE — `api_key_env` is the NAME of an environment
# variable. Put the value in .env (gitignored) or export it in your shell.
#
# `kind` is the WIRE PROTOCOL (openai | anthropic), not the vendor.
# RESERVED: never name an entry openai / anthropic / local — those always take
# the pre-registry code path so older configs keep resolving the same way.
#
# Note: a consumer SUBSCRIPTION is usually not API access. ChatGPT Plus grants
# no platform.openai.com quota and X Premium grants no x.ai quota; both need
# separately-billed API keys. Check your provider before assuming otherwise.
# ---------------------------------------------------------------------------
providers:
  freellmapi:
    kind: openai
    base_url: "http://localhost:3001/v1"
    model: "auto"
    api_key_env: FREELLMAPI_API_KEY
    api_key_optional: true
  # MiniMax Token Plan is an API subscription: paste its sk-cp- Subscription
  # Key into MINIMAX_API_KEY. A pay-as-you-go sk-api key is a different
  # credential and will not consume the plan's quota.
  minimax:
    label: "MiniMax M3 · Token Plan"
    description: "Subscription/Credits key from Billing > Token Plan"
    kind: anthropic
    base_url: "https://api.minimax.io/anthropic"
    model: "MiniMax-M3"
    api_key_env: MINIMAX_API_KEY
    api_key_prefix: "sk-cp-"
  kobold:
    kind: openai
    base_url: "http://localhost:5001/v1"
    model: "gemma-4-E4B-it-Q8_k"
    api_key_env: null

generation:
  # A `providers:` name or a reserved legacy name (openai | anthropic | local).
  # Change `model` whenever you change this.
  provider: freellmapi
  base_url: "http://localhost:3001/v1"   # legacy providers only
  model: "auto"
  temperature: 0.1
  max_tokens: 2500
  verify_citations: false                          # text-embedding-3-small native dim
  # Reserved legacy `local` provider (KoboldCPP/OpenAI-compatible). Prefer a
  # named registry entry for new setups; this block preserves older configs.
  local:
    base_url: "http://localhost:5001/v1"
    api_key: "koboldcpp"                    # dummy; KoboldCPP ignores it
    model: "gemma-4-E4B-it-Q8_k"            # whatever /v1/models reports
    # Context length is set when KoboldCPP launches, not per request.

retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  rrf_k: 60
  rerank_top_k: 7
  rerank_mode: cross_encoder                # cross_encoder | http | lexical | none
  # Any HF cross-encoder id. Bigger rerankers score better on public benchmarks
  # but cost far more per query — measure before switching:
  #   cross-encoder/ms-marco-MiniLM-L-6-v2   22M params   fast   (default)
  #   BAAI/bge-reranker-base                 278M params  medium
  #   BAAI/bge-reranker-v2-m3                568M params  slow on CPU (~20x),
  #                                          multilingual, 8k context, GPU
  #                                          strongly recommended
  cross_encoder_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  cross_encoder_max_length: 512     # bge-base hard limit; v2-m3 supports 8192
  cross_encoder_device: auto        # auto | cpu | cuda | cuda:0 | cuda:1
  # Used only when rerank_mode: http. Point at any OpenAI-style /v1/rerank
  # service (llama.cpp --reranking, TEI, Infinity, etc.).
  rerank_http:
    base_url: "http://127.0.0.1:8101/v1"
    model: "bge-reranker-v2-m3"
    timeout: 120
  use_hyde: true
  # If a query mentions a course/domain, bias retrieval toward it
  metadata_boost: true

  # Small-to-big context expansion (post-rerank), both OFF by default; the
  # `synthesis` preset turns them on. parent_context swaps a markdown chunk for
  # its whole enclosing section, read from the sidecar below (parents are never
  # embedded). neighbor_context appends adjacent pages of the same PDF as
  # marked supplementary sources.
  parent_context: false
  parents_file: "data/parents_md.jsonl"      # per-corpus; the vault switcher moves it
  neighbor_context: false
  neighbor_max_per_doc: 2
  neighbor_max_total: 4
  neighbor_max_chars: 2500

  # HyDE bypass for code-intent queries. If the query contains any of these
  # signals (case-insensitive, word-boundary matched; trailing '_' or '.'
  # behaves like a prefix, e.g. "geom_" matches geom_point), the hypothetical-
  # answer LLM call is skipped and the raw query is used for search. Prose
  # hypotheticals bias dense retrieval toward lecture notes and away from
  # actual code chunks (~2.4% of the corpus). Extend freely — no code change.
  hyde_skip_signals:
    - code
    - script
    - function
    - snippet
    - notebook
    - implement
    - implementation
    - "show me my"
    - "my r"
    - "my python"
    - ggplot
    - geom_
    - dplyr
    - tidyverse
    - matplotlib
    - seaborn
    - pandas
    - numpy
    - sklearn
    - pytorch
    - regex
    - sql

  # File types that count as "the author's own code" for the code lane: when a
  # code-intent query fires, an extra dense+sparse pass restricted to these
  # types joins the RRF fusion, guaranteeing actual script/notebook chunks
  # reach the reranker (they're ~2.4% of the corpus and otherwise get
  # outscored by lecture PDFs that merely mention the same keywords).
  code_file_types: [ipynb, py, r, rmd]

  # ------------------------------------------------------------------
  # Scope routing: queries that NAME a domain or content type get extra
  # filtered dense+sparse lanes in the RRF fusion (soft routing — the
  # reranker still decides; a bad hint can't empty the results).
  # Same matcher as hyde_skip_signals: word-boundary, plural-tolerant.
  # ------------------------------------------------------------------

  # domain metadata value -> query keywords/aliases that point at it.
  # Keys MUST be values the `domain` metadata field actually holds
  # (stats, ml, nlp, viz, biz, ts, db, math, swe, prog).
  domain_signals:
    stats: [statistics, statistical, stats, probability, bayesian, bayes,
            hypothesis testing, conjugate prior, confidence interval]
    ml:    [machine learning, ml, deep learning, dl, neural network,
            neural networks, sklearn, scikit-learn, pytorch, tensorflow,
            reinforcement learning, rl, genai, generative ai, llm,
            gradient descent, hugging face]
    nlp:   [nlp, natural language processing, natural language, transformer,
            transformers, bert, mbert, tokenizer, tokenization, embedding,
            embeddings, spacy, nltk, stanza, sentencepiece]
    viz:   [visualization, visualizations, dataviz, data viz,
            data visualization, ggplot, matplotlib, seaborn, plotly,
            tableau, power bi]
    biz:   [business intelligence, bi, business analytics,
            marketing analytics, marketing, dax, power bi, tableau]
    ts:    [time series, forecasting, arima, sarima, seasonality]
    db:    [database, databases, sql, postgresql, postgres, mysql, mongodb,
            data engineering, sqlalchemy]
    math:  [calculus, linear algebra, numerical methods, math, mathematics,
            eigenvalue, eigenvalues]
    swe:   [software architecture, software engineering, devops, docker,
            kubernetes, fastapi, web development, design pattern,
            design patterns, microservices]
    prog:  [data structures, algorithms, python development]

  # content label -> {signals: query keywords, path_contains: source_file
  # substrings (case-insensitive), file_types: file_type metadata values}.
  # Content aspects OR together; domain AND content must both hold
  # ("my homework from NLP" = homework path AND nlp domain).
  content_signals:
    homework:    {signals: [homework, hw, assignment, assignments, problem set],
                  path_contains: [homework, hw, assignment]}
    lectures:    {signals: [lecture, lectures, slides, lecture notes],
                  path_contains: [lecture, slides]}
    tech_books:  {signals: [tech book, tech books],
                  path_contains: [tech books]}
    books:       {signals: [textbook, textbooks, book, books],
                  path_contains: [books]}
    cheatsheets: {signals: [cheat sheet, cheat sheets, cheatsheet, cheatsheets],
                  path_contains: [cheat sheet, cheatsheet]}
    notebooks:   {signals: [notebook, notebooks, jupyter],
                  file_types: [ipynb]}
    capstone:    {signals: [capstone, thesis],
                  path_contains: [capstone]}
    coursera:    {signals: [coursera],
                  path_contains: [coursera]}
    daily_notes: {signals: [daily note, daily notes, study notes],
                  file_types: [daily_note]}
    current:     {signals: [current course, current courses, this semester],
                  path_contains: [current courses]}
    passed:      {signals: [passed course, passed courses, passed coursework],
                  path_contains: [passed]}

# ------------------------------------------------------------------
  # Live-vault lane via Obsidian's Omnisearch plugin (community plugin).
  # Adds an extra RRF lane of LIVE results — notes edited since the last
  # ingest, with Omnisearch's filename/heading-weighted BM25. Requires
  # Obsidian OPEN with Omnisearch's "HTTP Server" setting enabled
  # (default port 51361, localhost only). Fail-soft: Obsidian closed ->
  # the lane is silently empty, queries never break. Toggle per query
  # with {"omnisearch": true/false} on /query and /search.
  # ------------------------------------------------------------------
  omnisearch:
    enabled: false            # default OFF; flip on, or pass per-query
    base_url: "http://127.0.0.1:51361"
    top_k: 8                  # live results offered to the fusion
    timeout: 1.5              # seconds; keeps a closed Obsidian cheap
    excerpt_min_chars: 40     # drop excerpts too short to rerank meaningfully
    # allowed_exts: [.md, .markdown, .txt, .canvas]   # PDFs/images skipped —
    #                                 they're in our own index already

  # Named retrieval presets — per-query bundles of overrides, selected via
  # POST /query {"preset": "code"}, `python main.py query --preset code`, or
  # the Streamlit sidebar. The "code" preset is auto-applied when a query
  # trips hyde_skip_signals (wider candidate pool so BM25's code hits survive
  # RRF fusion and reach the reranker). Omitted keys fall back to the
  # defaults above.
  # (presets may also set `omnisearch: true` to include the live-vault lane)
  presets:
    code:      {rerank_top_k: 10, use_hyde: false, dense_top_k: 40, sparse_top_k: 40, boost_code: true}
    concept:   {rerank_top_k: 5,  use_hyde: true}
    synthesis: {rerank_top_k: 10, use_hyde: true, dense_top_k: 30, sparse_top_k: 30}
    fresh:     {rerank_top_k: 8,  omnisearch: true}


# Golden-query eval suite (eval/eval_runner.py — `python main.py eval`).
# Tier 1 (retrieval) and the groundedness floor need nothing but the index;
# the judge tier reuses the `generation` client above.
eval:
  ngram_n: 2                    # content-word n-gram size for the deterministic
                                # groundedness floor. 1 = lenient (bag of words),
                                # 3 = strict (near-verbatim). 2 is the balance.
  judge:
    # Leave empty to reuse the generation client (self-grading — the runner
    # warns). Name a `providers:` entry to judge with a different backend.
    provider: null
    model: null
    temperature: 0.0
    max_tokens: 700             # per LLM-as-judge call (rubric JSON is small)

logging:
  level: INFO                               # DEBUG | INFO | WARNING | ERROR
  file: "logs/rag.log"
  console: true

pdf:
  output_file: "data/pdf_chunks.jsonl"
  scratch_dir: null                           # optional: route HF cache + temp to a big drive
  min_chunk_size: 200
  max_chunk_size: 3000
  overlap_size: 150
  skip_scanned_threshold: 50                # chars/page below which a page = scanned
  skip_list_file: null                      # optional JSON array of vault-relative paths to skip
  skip_scripts: ["armenian"]
  script_sample_pages: 3
  skip_folders: []
  extract_images: true
  figures_dir: data/figures
  image_min_frac: 0.08
  ocr_enabled: true
  ocr_language: "eng"                       # add "+hye" for Armenian if tessdata present
  # OCR engine for scanned pages:
  #   auto      -> historical behavior (Tesseract-first probe)   [default]
  #   tesseract -> pin the classic path
  #   vlm       -> vision-model document parsing via the endpoint below
  #   none      -> disable OCR (same as --no-ocr)
  ocr_engine: auto
  # VLM document-parsing OCR (reference model: baidu/Unlimited-OCR, 3B).
  # Reached over ANY OpenAI-compatible /chat/completions endpoint that takes
  # image_url content — SGLang/vLLM on a GPU box, llama.cpp/LM Studio serving
  # a GGUF quant locally, or FreeLLMAPI (:3001) fronting a free hosted vision
  # model. Per-page markdown replaces the scanned page's empty extraction.
  # Named VLM-OCR engines. Each model needs its OWN prompt and dpi —
  # DeepSeek-OCR requires llama.cpp's <__media__> marker because it ships no
  # chat template of its own, the others don't — so a preset bundles them and
  # switching engine is one word instead of four keys that fail confusingly
  # when mismatched. Selected by `vlm_ocr.preset` below.
  vlm_ocr_presets:
    deepseek:
      model: "DeepSeek-OCR"
      prompt: "<__media__>\nConvert the document to markdown."
      dpi: 150
    paddleocr_vl:
      model: "PaddleOCR-VL"
      prompt: "Convert the document to markdown."
      dpi: 200
    glm_ocr:
      model: "GLM-OCR"
      prompt: "Convert the document to markdown."
      dpi: 200

  vlm_ocr:
    preset: null                            # a name above, or null for the keys here
    base_url: "http://127.0.0.1:8100/v1"
    model: "Unlimited-OCR"                  # match what the server reports
    api_key_env: "OPENAI_API_KEY"           # sent if set; local servers ignore it
    prompt: "<image>document parsing."      # Unlimited-OCR's parsing prompt
    dpi: 200                                # 300 for dense math scans (slower)
    timeout: 300                            # generous — CPU-quant servers are slow
    max_tokens: 8192
    max_pages_per_pdf: null                 # safety cap for huge scanned books
    # Free text shown verbatim in the console's OCR panel when the endpoint is
    # down — your own reminder of how to start it. Never executed.
    launch_hint: "Start your vision server on :8100, then press Probe."
  only_book_folders: false                  # true = only ingest PDFs under Books/ dirs
  max_pages_per_pdf: null                   # cap pages (null = no cap)
notebooks:
  # vault_path falls back to pdf.vault_path -> parser.vault_path if unset
  output_file: "data/ipynb_chunks.jsonl"
  extensions: [".ipynb", ".py", ".R", ".Rmd"]   # file types to ingest
  min_chunk_size: 200
  max_chunk_size: 3000
  overlap_size: 150
  include_outputs: true                          # append text cell outputs
  max_output_chars: 2000                         # cap per-cell output length
  skip_scripts: ["armenian"]                     # per-cell: placeholder Armenian prose/output
  save_figures: false                            # true = decode image outputs to figures_dir
  figures_dir: data/notebook_figures

webui:
  # Management console (manage_api.py) — ingest/index/OCR/delete from a browser.
  #   python -m uvicorn manage_api:app --host 127.0.0.1 --port 8052
  port: 8052                                 # 8051 = query API, 8501 = Streamlit
  rag_api: "http://127.0.0.1:8051"           # the query endpoint the console talks to
  auto_restart_rag: false                    # restart :8051 automatically after index-changing jobs
  # Browser uploads land INSIDE the vault here (created if missing), so the
  # normal ingest passes pick them up with --include-path "Inbox":
  inbox_dir: "Inbox"
  # Vault-tab browse root, vault-relative. "" = the vault root. Set it to a
  # subfolder if only part of your vault is material worth indexing.
  vault_tree_root: ""
  jobs_dir: "logs/jobs"                      # one log file per job
  manifest_cache: "data/.manifest_cache.json"
  # NOTE: ingest jobs started from the console write their output JSONL next to
  # paths.chunks_file (the ACTIVE vault's data dir), not into the project's
  # ./data — otherwise switching vaults leaves new chunks in the old vault's
  # folder, where the next BM25 rebuild sweeps them into the wrong corpus.

# NOTE: the vault switcher (Settings → Vaults) carries all of these PER VAULT —
# vault_path, the index trio, collection name, inbox_dir, vault_tree_root and
# manifest_cache travel together, so a second vault never inherits the first
# one's browse root or cached in-RAG status. Every key it manages must EXIST in
# this file, or a switch fails with "found 0 matches".
