    expect_keywords: ["autoregressive", "integrated", "moving average"]
    expect_course: "Time Series & Forecasting"
  - question: "What is stationarity and how do you test for it?"
    domain: ts
    expect_keywords: ["stationarity", "Dickey-Fuller", "mean", "variance"]
  - question: "Explain seasonal decomposition of a time series."
    domain: ts
    expect_keywords: ["seasonal", "trend", "residual"]

  # ---- Business Intelligence ----
