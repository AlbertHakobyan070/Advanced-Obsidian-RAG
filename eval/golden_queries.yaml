# ============================================================
#  Golden query eval suite — the personal RAG
#  94 questions: the original 30 conceptual seeds, plus exam-like
#  questions modeled on ACTUAL exam/PSS/quiz samples found in the
#  vault (DS206 SQL midterms, RL midterm samples + tree-MDP worked
#  examples, MA quizzes, NLP PSS/HWs, Armenian History midterm Q&As),
#  plus own-code / problem-situation queries against the author's real
#  assignments and projects.
#
#  Each query has:
#    question        — what the user asks
#    domain          — expected domain tag (for retrieval hit-rate)
#    expect_keywords — terms a correct answer should contain (recall proxy)
#    expect_course   — (optional) course the top source should come from
#
#  Run:  python main.py eval                      (full, needs the LLM)
#        python main.py eval --retrieval-only     (minutes, offline)
# ============================================================

queries:
  # ---- NLP ----
  - question: "What is knowledge distillation and how does it transfer knowledge from a teacher to a student model?"
    domain: nlp
    expect_keywords: ["teacher", "student", "soft", "distillation"]
    expect_course: "Capstone"
  - question: "How does a BiLSTM process sequences differently from a unidirectional LSTM?"
    domain: nlp
    expect_keywords: ["forward", "backward", "bidirectional"]
  - question: "What is the role of mBERT in multilingual NLP tasks?"
    domain: nlp
    expect_keywords: ["multilingual", "transformer", "embedding"]
  - question: "Explain the attention mechanism in transformers."
    domain: nlp
    expect_keywords: ["attention", "query", "key", "value"]

  # ---- ML ----
  - question: "What is cross-entropy loss and when is it used?"
    domain: ml
    expect_keywords: ["cross-entropy", "classification", "probability"]
  - question: "Explain the bias-variance tradeoff."
    domain: ml
    expect_keywords: ["bias", "variance", "overfitting"]
  - question: "What is regularization and how do L1 and L2 differ?"
    domain: ml
    expect_keywords: ["regularization", "L1", "L2", "penalty"]
  - question: "How does gradient descent update model parameters?"
    domain: ml
    expect_keywords: ["gradient", "learning rate", "minimize"]

  # ---- Reinforcement Learning ----
  - question: "What is the difference between value-based and policy-based RL methods?"
