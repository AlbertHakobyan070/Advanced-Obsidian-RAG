# ============================================================
#  Golden-query suite — ILLUSTRATIVE EXAMPLE
# ============================================================
#  This is a small example set showing the SUITE SHAPE — six queries
#  covering the three core shapes the runner scores:
#
#    - conceptual   : a clean concept question, expects keyword recall
#    - exam-like    : a question that would appear in a textbook chapter
#                     review or a course final (still no exam leakage)
#    - code         : a code-shape query (use the "code" preset)
#
#  Six queries is enough to demonstrate the runner and to seed a CI
#  smoke test of the pipeline. For a real regression, REPLACE this
#  file with 30-100 queries written from YOUR corpus, with
#  `expect_keywords` and (optionally) `domain` / `expect_course`
#  filled in from the actual retrieved material.
#
#  Fields:
#    question        : the query
#    preset          : (optional) "code" | "concept" | "synthesis"
#    expect_keywords : terms that should appear in the top-k retrieval pool
#                      (used for keyword_recall; checkable against your sources)
#    domain          : (optional) the `domain` metadata value you expect in top-k
#    expect_course   : (optional) the canonical course_name you expect on the
#                      #1 source's metadata (requires parser.course_taxonomy
#                      in config.yaml to be populated for your corpus)
#
#  Run with:
#    python main.py eval --retrieval-only        # offline, no LLM, ~minutes
#    python main.py eval                          # full run, needs generation endpoint
# ============================================================

queries:

  # ── CONCEPTUAL ───────────────────────────────────────────────
  - question: "Explain the difference between precision and recall with a worked example."
    expect_keywords: ["precision", "recall", "true positive", "false positive"]
    domain: ml

  - question: "What is the central limit theorem and why does it matter in practice?"
    expect_keywords: ["central limit", "sampling distribution", "mean", "variance"]
    domain: stats

  - question: "Describe how a hash table handles collisions, and compare open addressing with separate chaining."
    expect_keywords: ["collision", "open addressing", "chaining", "hash"]
    domain: prog

  # ── EXAM-LIKE (textbook review questions) ────────────────────
  - question: "State Bayes' rule and apply it to a diagnostic-test example with a numerical prior."
    expect_keywords: ["bayes", "prior", "likelihood", "posterior"]
    domain: stats

  - question: "Compare gradient descent, stochastic gradient descent, and mini-batch SGD. When is each preferred?"
    expect_keywords: ["gradient", "stochastic", "mini-batch", "convergence"]
    domain: ml

  # ── CODE ─────────────────────────────────────────────────────
  - question: "Show me a clean Python implementation of a binary search over a sorted array with iterative and recursive variants."
    preset: code
    expect_keywords: ["def", "binary", "search", "mid"]
    domain: prog
