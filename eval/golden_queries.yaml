    expect_keywords: ["value", "policy", "reward"]
  - question: "Explain the Bellman equation."
    domain: ml
    expect_keywords: ["Bellman", "value", "state"]

  # ---- Statistics ----
  - question: "What is a p-value and how is it interpreted?"
    domain: stats
    expect_keywords: ["p-value", "null hypothesis", "significance"]
  - question: "Explain the central limit theorem."
    domain: stats
    expect_keywords: ["central limit", "normal", "sample mean"]
  - question: "What is the difference between Type I and Type II errors?"
    domain: stats
    expect_keywords: ["Type I", "Type II", "false positive"]

  # ---- Time Series ----
  - question: "What does ARIMA stand for and what does each component model?"
