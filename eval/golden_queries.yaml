    expect_keywords: ["gradient", "partial derivative", "vector"]
  - question: "Explain eigenvalues and eigenvectors."
    domain: math
    expect_keywords: ["eigenvalue", "eigenvector", "matrix"]
  - question: "What is the Newton-Raphson method for root finding?"
    domain: math
    expect_keywords: ["Newton", "iteration", "root", "derivative"]

  # ---- Cross-domain / synthesis ----
  - question: "How does the chain rule from calculus relate to backpropagation in neural networks?"
