# ============================================================
#  Golden query eval suite — the personal RAG
#  100 questions: the original 30 conceptual seeds, plus exam-like
#  questions modeled on ACTUAL exam/PSS/quiz samples found in the
#  vault (DS206 SQL midterms, RL midterm samples + tree-MDP worked
#  examples, MA quizzes, NLP PSS/HWs), plus own-code / problem-situation
#  queries against the author's real assignments and projects.
#
#  Session 16: history questions removed; the suite is now entirely
#  data-science/technical. Two NLP questions were rewritten to drop a
#  language-specific framing while keeping their technical substance.
#  Eight questions were added to balance the thin domains (viz/prog/db/
#  math/ts/stats) — every one probed against the live index first, so
#  none of them is a question the corpus cannot answer.
#
#  REQUIRED per query:
#    question        — what the user asks
#    domain          — expected domain tag (hit-rate@k, MRR, scope routing)
#    expect_keywords — terms a correct answer should contain (recall proxy)
#
#  OPTIONAL — each one switches on a metric; ABSENT means the metric is not
#  scored for that query (reported as null with its coverage count, never as
#  a zero). Add them incrementally; nothing breaks while they are missing.
#
#    expect_course         course the #1 source should come from. Auto-skipped
#                          entirely when the corpus has no course metadata.
#    expected_source_files list of vault paths (or trailing fragments, e.g.
#                          "NLP/Lecture 3.md") that SHOULD be retrieved →
#                          enables recall@k. Matching ignores case, slash
#                          direction and dash flavour, so an en-dash in the
#                          real path still matches a typed hyphen.
#    expect_scope          domains the auto scope-router SHOULD fire on — set
#                          this only when the QUESTION TEXT actually names a
#                          domain ("in my NLP homework", "using SQL"). It is
#                          NOT the same as `domain`: most questions ("Explain
#                          the bias-variance tradeoff") name no domain at all,
#                          and a silent router is correct for those. Enables
#                          scope_recall; without it recall is not scored,
#                          while scope precision + fire-rate still are.
#    gold_answer           reference answer in prose → enables the LLM-judge
#                          correctness score (`--judge`). Without it the judge
#                          still scores groundedness, and its correctness
#                          number is DISCARDED — a model grading its own
#                          output against no reference measures nothing.
#
#  Run:  python main.py eval                      (all tiers, needs the LLM)
#        python main.py eval --retrieval-only     (tier 1, minutes, offline)
#        python main.py eval --judge              (adds the advisory judge tier)
#        python main.py eval --limit 5            (smoke run)
#
#  Example of a fully-labelled entry:
#    - question: "What is knowledge distillation?"
#      domain: nlp
#      expect_keywords: ["teacher", "student", "soft"]
#      expect_course: "Capstone"
#      expected_source_files: ["Capstone/distillation notes.md"]
#      gold_answer: >
#        A large teacher model's soft output distribution is used as the
#        training target for a smaller student, transferring the teacher's
#        learned class similarities rather than just the hard labels.
# ============================================================

